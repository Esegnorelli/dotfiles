# ==========================================
# KITTY CONFIGURATION (GRUVBOX ULTIMATE)
# ==========================================

# --- 1. FONTE (JETBRAINS MONO) ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
# Habilita ligaduras (ex: => vira uma seta)
disable_ligatures never

# --- 2. CURSOR ---
cursor_shape block
cursor_blink_interval 0.5
# Cursor na cor do texto para alto contraste
cursor none 

# --- 3. MOUSE & CLIPBOARD ---
# Selecionar texto copia automaticamente (Sem Ctrl+Shift+C)
copy_on_select yes
# Remove espaços extras no final da linha ao copiar
strip_trailing_spaces smart
# Esconde o mouse ao digitar
mouse_hide_wait 3.0

# --- 4. JANELA & BORDAS ---
# 'no' = Mostra a barra de título e bordas do KDE (Permite redimensionar)
hide_window_decorations no
# Margem interna para beleza
window_padding_width 10
# Transparência (Blur depende do Compositor do KDE)
background_opacity 0.95
# Lembra o tamanho da janela
remember_window_size  yes
initial_window_width  1000
initial_window_height 650
# Não pede confirmação para fechar
confirm_os_window_close 0

# --- 5. ABAS (ESTILO POWERLINE) ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_activity_symbol 
active_tab_font_style   bold
inactive_tab_font_style normal

# Cores das abas (Gruvbox)
active_tab_foreground   #282828
active_tab_background   #fabd2f
inactive_tab_foreground #ebdbb2
inactive_tab_background #3c3836

# --- 6. PERFORMANCE ---
repaint_delay 10
input_delay 3
sync_to_monitor yes

# --- 7. TEMA DE CORES ---
# O tema é carregado de um arquivo externo para facilitar a troca
include current-theme.conf
