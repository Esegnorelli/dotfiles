# ============================================================================
# KITTY TERMINAL - CONFIGURAÇÃO PROFISSIONAL
# ============================================================================
# Setup otimizado para desenvolvimento, replicável em qualquer máquina
# Estrutura modular para fácil manutenção

# ============================================================================
# FONTES - Nerd Fonts com ligaduras
# ============================================================================
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        10.0

# Ligaduras de programação (flechas, operadores, etc)
disable_ligatures never

# Anti-aliasing suave
font_features JetBrainsMonoNF-Regular +zero +cv02 +cv03 +cv04 +ss01 +ss02

# ============================================================================
# CURSOR - Animado e moderno
# ============================================================================
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Efeito de trilha (muito suave e moderno!)
cursor_trail 1
cursor_trail_decay 0.1 0.5
cursor_trail_start_threshold 2

# ============================================================================
# SCROLLBACK - Histórico grande
# ============================================================================
scrollback_lines 50000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 10
scrollback_fill_enlarged_window yes

# Indicador de scroll
scrollback_indicator_opacity 0.3

# ============================================================================
# MOUSE - Comportamento inteligente
# ============================================================================
mouse_hide_wait 3.0
copy_on_select clipboard
strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#

# URLs clicáveis com cor diferente
url_color #61afef
url_style curly
detect_urls yes
show_hyperlink_targets yes

# ============================================================================
# PERFORMANCE - GPU acelerado
# ============================================================================
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ============================================================================
# TRANSPARÊNCIA E BLUR - Efeito moderno
# ============================================================================
background_opacity 0.92
dynamic_background_opacity yes
background_blur 32
background_tint 0.85

# ============================================================================
# JANELA - Layout e comportamento
# ============================================================================
remember_window_size  yes
initial_window_width  1400
initial_window_height 900

# Padding interno (espaço respirável)
window_padding_width 8 12
window_padding_height 8

# Bordas entre splits
window_border_width 1pt
draw_minimal_borders yes
window_margin_width 0
single_window_margin_width -1

# Estilo de borda ativa
active_border_color #61afef
inactive_border_color #3e4451

# Sem decorações do sistema (mais limpo)
hide_window_decorations no
wayland_titlebar_color background

# Confirmação ao fechar
confirm_os_window_close 1

# ============================================================================
# TABS - Barra superior estilizada
# ============================================================================
tab_bar_edge top
tab_bar_margin_width 0.0
tab_bar_margin_height 4.0 0.0
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1

# Template das tabs com ícones
tab_title_template " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}:{title.split()[0] if title else 'shell'} "
active_tab_title_template " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}:⚡{title.split()[0] if title else 'shell'} "

# Cores das tabs
active_tab_foreground   #282c34
active_tab_background   #61afef
active_tab_font_style   bold
inactive_tab_foreground #abb2bf
inactive_tab_background #3e4451
inactive_tab_font_style normal

# ============================================================================
# LAYOUTS - Gerenciamento de janelas
# ============================================================================
enabled_layouts splits,stack,tall,fat,grid,horizontal,vertical

# ============================================================================
# CORES - Suporte verdadeiro
# ============================================================================
term xterm-256color
# Forçar true color
env COLORTERM=truecolor

# ============================================================================
# BELL - Notificações visuais
# ============================================================================
enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color none
window_alert_on_bell yes
bell_on_tab "🔔 "
command_on_bell none

# ============================================================================
# TEMA - Incluir tema externo
# ============================================================================
include theme.conf

# ============================================================================
# ATALHOS - Produtividade máxima
# ============================================================================

# Limpar atalhos padrão
clear_all_shortcuts yes
kitty_mod ctrl+shift

# --- Clipboard ---
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+s paste_from_selection
map shift+insert paste_from_selection

# --- Tabs ---
map kitty_mod+t new_tab_with_cwd
map kitty_mod+w close_tab
map kitty_mod+right next_tab
map kitty_mod+left previous_tab
map kitty_mod+alt+t set_tab_title
map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5
map kitty_mod+6 goto_tab 6
map kitty_mod+7 goto_tab 7
map kitty_mod+8 goto_tab 8
map kitty_mod+9 goto_tab 9

# --- Janelas/Splits ---
map kitty_mod+enter new_window_with_cwd
map kitty_mod+n new_os_window
map kitty_mod+q close_window
map kitty_mod+] next_window
map kitty_mod+[ previous_window
map kitty_mod+f move_window_forward
map kitty_mod+b move_window_backward
map kitty_mod+` move_window_to_top
map kitty_mod+r start_resizing_window

# Split vertical e horizontal (vim-like)
map kitty_mod+\ launch --location=vsplit --cwd=current
map kitty_mod+- launch --location=hsplit --cwd=current

# Navegação entre janelas (vim-like)
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right
map ctrl+k neighboring_window up
map ctrl+j neighboring_window down

# --- Layouts ---
map kitty_mod+l next_layout
map kitty_mod+z toggle_layout stack

# --- Zoom de fonte ---
map kitty_mod+equal change_font_size all +1.0
map kitty_mod+minus change_font_size all -1.0
map kitty_mod+0 change_font_size all 0

# --- Transparência dinâmica ---
map kitty_mod+a>m set_background_opacity +0.05
map kitty_mod+a>l set_background_opacity -0.05
map kitty_mod+a>1 set_background_opacity 1
map kitty_mod+a>d set_background_opacity default

# --- Scrollback ---
map kitty_mod+up scroll_line_up
map kitty_mod+down scroll_line_down
map kitty_mod+page_up scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home scroll_home
map kitty_mod+end scroll_end
map kitty_mod+h show_scrollback

# --- Busca ---
map kitty_mod+/ launch --type=overlay --stdin-source=@screen_scrollback fzf --no-sort --no-mouse --exact -i

# --- Reload config ---
map kitty_mod+f5 load_config_file
map kitty_mod+f6 debug_config

# --- Misc ---
map kitty_mod+e edit_config_file
map kitty_mod+escape kitty_shell window
map kitty_mod+delete clear_terminal reset active

# ============================================================================
# SHELL - Integração
# ============================================================================
shell .
shell_integration enabled

# ============================================================================
# AVANÇADO - Configurações especiais
# ============================================================================
allow_remote_control yes
listen_on unix:/tmp/kitty
update_check_interval 0
clipboard_control write-clipboard write-primary read-clipboard read-primary

# Startup session
# startup_session ~/.config/kitty/session.conf

# ============================================================================
# LINUX ESPECÍFICO
# ============================================================================
linux_display_server auto
