# ============================================================================
# KITTY SESSION - Layout padrão ao iniciar
# ============================================================================
# Descomente para usar: startup_session ~/.config/kitty/session.conf

# Layout inicial
layout splits

# Janela principal - Editor/IDE
launch zsh
focus

# Split horizontal - Terminal de comandos
# launch --location=hsplit zsh

# Nova tab - Monitoramento (htop, logs, etc)
# new_tab Monitoring
# launch htop

# Nova tab - Git
# new_tab Git
# launch zsh

# Voltar para primeira tab
# focus_tab 1
